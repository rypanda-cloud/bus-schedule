<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立命館大学バス案内 2025</title>
    <style>
        :root {
            --bg-color: #f4f7f9; --card-bg: #ffffff; --text-main: #333333;
            --text-sub: #666666; --main-blue: #00479d; --accent-red: #e63946;
            --tab-bg: #dddddd; --border-color: #eeeeee;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0;
                --text-sub: #aaaaaa; --main-blue: #4a90e2; --accent-red: #ff5252;
                --tab-bg: #333333; --border-color: #333333;
            }
        }
        body.night-mode {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-blue: #38bdf8; --accent-red: #fb7185;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: var(--text-main); transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        
        /* 階層型メニュー */
        .section-label { font-size: 0.85rem; font-weight: bold; margin: 15px 5px 5px; color: var(--text-sub); text-transform: uppercase; }
        .tabs { display: flex; flex-wrap: wrap; background: var(--tab-bg); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 10px; }
        .tab-btn { flex: 1; min-width: 100px; border: none; padding: 10px 5px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; background: transparent; color: var(--text-sub); transition: 0.2s; }
        .tab-btn.active { background: var(--card-bg); color: var(--main-blue); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

        .card { background: var(--card-bg); border-radius: 24px; padding: 25px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border-color); margin-top: 15px; }
        .direction-info { margin-bottom: 15px; }
        .stop-badge { display: inline-block; background: var(--main-blue); color: white; padding: 2px 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 5px; }
        .dest-label { font-size: 1.1rem; font-weight: bold; display: block; }
        
        .timer { font-size: 3.5rem; font-weight: bold; color: var(--accent-red); margin: 10px 0; line-height: 1; }
        .timer span { font-size: 1.3rem; margin-left: 2px; }

        .later-list { border-top: 2px dashed var(--border-color); padding-top: 15px; text-align: left; margin-top: 15px; }
        .later-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .later-label { color: var(--text-sub); font-size: 0.8rem; width: 60px; }
        .later-time { font-weight: bold; font-size: 1rem; flex-grow: 1; }
        .later-diff { color: var(--accent-red); font-size: 0.85rem; font-weight: bold; }
        
        .footer-info { margin-top: 20px; font-size: 0.75rem; color: var(--text-sub); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-label">1. 出発地を選択</div>
    <div class="tabs">
        <button id="base-station" class="tab-btn" onclick="setBase('station')">南草津駅 発</button>
        <button id="base-univ" class="tab-btn" onclick="setBase('univ')">立命館大学 発</button>
    </div>

    <div id="route-selection">
        <div class="section-label">2. 乗り場・行き先を選択</div>
        <div id="route-tabs" class="tabs"></div>
    </div>

    <div class="card">
        <div class="direction-info">
            <span id="stop-name" class="stop-badge">--</span>
            <span id="dest-name" class="dest-label">目的地</span>
        </div>
        
        <div class="next-label" style="font-size:0.9rem; color:var(--text-sub);">先発まであと</div>
        <div id="countdown" class="timer">--<span>分</span>--<span>秒</span></div>
        
        <div class="later-list">
            <div class="later-item">
                <span class="later-label">次発</span>
                <span class="later-time" id="time2">--:--</span>
                <span id="diff2" class="later-diff"></span>
            </div>
            <div class="later-item">
                <span class="later-label">次々発</span>
                <span class="later-time" id="time3">--:--</span>
                <span id="diff3" class="later-diff"></span>
            </div>
        </div>
    </div>
    
    <div class="footer-info">2025年4月7日改正 平日・開講ダイヤ対応</div>
</div>

<script>
// PDFデータに基づく時刻表 (平日・開講) 
const busData = {
    station: {
        routes: [
            { id: 's1', stop: '1番のりば', dest: '立命館大学 行 (直行・全経由)', 
              times: ["07:01","07:05","07:15","07:16","07:18","07:20","07:23","07:25","07:27","07:30","07:33","07:37","07:40","07:43","07:45","07:47","07:50","07:52","07:55","07:57","08:01","08:02","08:05","08:12","08:15","08:16","08:18","08:20","08:23","08:25","08:27","08:30","08:33","08:37","08:40","08:43","08:45","08:47","08:50","08:53","08:55","08:58","09:01","09:02","09:04","09:07","09:10","09:12","09:15","09:18","09:21","09:24","09:25","09:27","09:30","09:33","09:37","09:40","09:43","09:47","09:50","09:53","09:58","10:01","10:04","10:07","10:10","10:12","10:15","10:18","10:21","10:24","10:27","10:30","10:37","10:47","10:52","11:03","11:16","11:22","11:32","11:37","11:52","12:02","12:12","12:16","12:22","12:28","12:32","12:37","12:47","12:52","13:22","13:37","13:52","14:30","15:55"] }
        ]
    },
    univ: {
        routes: [
            { id: 'u3', stop: '3番のりば', dest: '南草津駅 行 (シャトル直行)', 
              times: ["10:50","11:50","12:25","12:30","12:43","12:50","13:10","13:30","13:50","14:10","14:30","14:40","14:50","14:53","14:58","15:03","15:10","15:15","15:20","15:30","15:40","15:50","16:00","16:03","16:10","16:20","16:30","16:37","16:40","16:43","16:47","16:50","16:53","16:57","17:03","17:15","17:20","17:40","17:50","18:05","18:20","18:23","18:28","18:33","18:38","18:48","18:58","19:03","19:18","19:33","19:48","20:08","20:45"] },
            { id: 'u2', stop: '2番のりば', dest: '南草津駅 行 (各線経由)', 
              times: ["07:00","07:15","07:35","08:05","08:35","09:05","09:35","10:05","10:40","11:05","11:35","12:05","12:35","13:05","13:35","14:05","14:35","15:05","15:35","16:05","16:40","17:10","17:35","17:50","18:05","18:20","18:35","18:50","19:05","19:20","19:35","19:50","20:05","20:20","20:50","21:50","22:40"] },
            { id: 'u1', stop: '1番のりば', dest: '草津駅・瀬田駅 行', 
              times: ["07:45","08:45","09:15","09:30","09:45","10:00","10:40","10:45","11:15","11:30","12:00","12:30","12:45","13:15","13:30","13:45","14:55","15:00","15:45","16:15","16:40","16:45","17:15","17:45","18:25","18:35","19:15","19:30","19:40","20:15","20:40","21:00"] }
        ]
    }
};

let currentBase = '';
let currentRouteId = '';

function init() {
    const hour = new Date().getHours();
    if (hour >= 18 || hour < 6) document.body.classList.add('night-mode');
    // 午前は駅発、午後は大学発をデフォルトに
    setBase(hour < 12 ? 'station' : 'univ');
}

function setBase(base) {
    currentBase = base;
    document.getElementById('base-station').classList.toggle('active', base === 'station');
    document.getElementById('base-univ').classList.toggle('active', base === 'univ');
    
    // 乗り場タブの生成
    const routeTabs = document.getElementById('route-tabs');
    routeTabs.innerHTML = '';
    busData[base].routes.forEach((route, index) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.innerText = route.stop;
        btn.onclick = () => setRoute(route.id);
        btn.id = `btn-${route.id}`;
        routeTabs.appendChild(btn);
    });
    
    // 最初のルートをデフォルト選択
    setRoute(busData[base].routes[0].id);
}

function setRoute(routeId) {
    currentRouteId = routeId;
    const routes = busData[currentBase].routes;
    const route = routes.find(r => r.id === routeId);
    
    // タブの見た目更新
    routes.forEach(r => {
        const btn = document.getElementById(`btn-${r.id}`);
        if(btn) btn.classList.toggle('active', r.id === routeId);
    });

    document.getElementById('stop-name').innerText = route.stop;
    document.getElementById('dest-name').innerText = route.dest;
    updateDisplay();
}

function updateDisplay() {
    const now = new Date();
    const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    const route = busData[currentBase].routes.find(r => r.id === currentRouteId);
    
    let upcoming = route.times.filter(t => t > nowStr);
    const isTomorrow = upcoming.length === 0;
    if (isTomorrow) upcoming = [route.times[0], route.times[1], route.times[2]];

    const countdownEl = document.getElementById('countdown');
    if (isTomorrow) {
        countdownEl.innerHTML = `<div style="font-size:1.5rem; color:var(--text-sub); padding:15px;">本日の運行終了</div>`;
        document.getElementById('time2').innerText = upcoming[0];
        document.getElementById('diff2').innerText = "明日始発";
    } else {
        const [h, m] = upcoming[0].split(':');
        const target = new Date(); target.setHours(h, m, 0);
        const diff = target - now;
        const min = Math.floor(diff / 1000 / 60);
        const sec = Math.floor(diff / 1000) % 60;
        countdownEl.innerHTML = `${min}<span>分</span>${sec}<span>秒</span>`;
        
        document.getElementById('time2').innerText = upcoming[1] || "終バス";
        document.getElementById('time3').innerText = upcoming[2] || "--:--";
        
        const calcMin = (t) => {
            const [th, tm] = t.split(':');
            const tt = new Date(); tt.setHours(th, tm, 0);
            return Math.floor((tt - now) / 1000 / 60);
        };
        document.getElementById('diff2').innerText = upcoming[1] ? `あと ${calcMin(upcoming[1])}分` : "";
        document.getElementById('diff3').innerText = upcoming[2] ? `あと ${calcMin(upcoming[2])}分` : "";
    }
}

init();
setInterval(updateDisplay, 1000);
</script>
</body>
</html>
